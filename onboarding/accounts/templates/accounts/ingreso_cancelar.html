{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cancelar ingreso</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
  <style>
    body{ margin:0; font-family:system-ui; background:linear-gradient(120deg,var(--bg1),var(--bg2)); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card{ background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:18px; max-width:520px; width:100%; }
    .btn{ border:none; cursor:pointer; padding:10px 14px; border-radius:999px; font-weight:800; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary{ color:#fff; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
    .btn.ghost{ background:#eff6ff; border:1px solid #dbeafe; color:#0b3a6e; }
    .actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin:0 0 8px;color:#0b3a6e;">Cancelar proceso de ingreso</h3>
    <p style="margin:0;color:#444;">
      ¿Seguro que deseas cancelar el ingreso <b>{{ ingreso.codigo_proceso }}</b> de <b>{{ ingreso.nombre_empleado }}</b>?
    </p>

    <form method="post" class="actions">
      {% csrf_token %}
      <a class="btn ghost" href="{% url 'rrhh_ingresos_listar' %}">Volver</a>
      <button class="btn primary" type="submit">Sí, cancelar</button>
    </form>
  </div>
</body>
</html>
